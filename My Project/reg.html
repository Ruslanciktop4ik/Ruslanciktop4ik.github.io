<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
    <title>Регистрация</title>
</head>
<body>

<div class="reg">
    <h1><b>Регистрация</b></h1>
</div>


<form action="index.html" method="get">
    <div class="container">
        <h2>Регистрация</h2>

        <input class="my-input" name="name" type="text" placeholder="Введите имя" required>
        <input class="my-input" name="email" type="email" placeholder="Введите электронную почту" required>
        <input class="my-input" name="password" type="password" placeholder="Введите пароль" required>
        <input class="my-input" name="login" type="text" placeholder="Введите логин" required>

        <button type="submit" class="btn">Войти</button>
    </div>
</form>

<script src="script.js"></script>

</body>
</html>
